version: "3.9"

services:

  backend:
    build: ./Backend

    container_name: ats-backend

    ports:
      - "5000:5000"

  nginx:
    image: nginx:latest

    container_name: ats-nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - backend